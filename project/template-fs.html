<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>FS Template</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
paper:'#F5F3EF',
sand:'#E7E0D6',
terracotta:'#C65A2E',
ink:'#1F2A2E'
}
}
}
}
</script>

</head>


<body class="bg-white text-ink">

<!-- HEADER -->

<header class="border-b border-sand bg-white">

<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">

<a href="../pilot-portfolio.html"
class="font-serif text-xl">

Gina <span class="text-terracotta">Suci.</span>

</a>

<a href="../pilot-portfolio.html"
class="text-sm text-terracotta">

← BACK TO CATALOGUE

</a>

</div>

</header>



<!-- HERO -->

<section class="bg-paper">

<div class="max-w-6xl mx-auto px-6 py-16">

<h1 class="font-serif text-5xl mb-2">

PROJECT TITLE

</h1>

<p class="text-sm text-gray-500">

Project subtitle here

</p>


<div class="mt-8 rounded-3xl overflow-hidden">

<img
src="../assets/fs01/p1.jpg"
class="w-full">

</div>

</div>

</section>



<!-- CONTENT -->

<section class="bg-paper border-t border-sand">

<div class="max-w-6xl mx-auto px-6 py-16 grid grid-cols-3 gap-12">

<div class="col-span-2">

<h5 class="text-terracotta text-xs tracking-widest">

THE CHALLENGE

</h5>

<p class="mt-2 text-lg leading-relaxed">

Challenge text

</p>


<h5 class="text-terracotta text-xs tracking-widest mt-8">

NARRATIVE SOLUTION

</h5>

<p class="mt-2 text-gray-600">

Solution text

</p>

</div>



<div>

<div class="border border-sand rounded-3xl p-6">

<p class="text-xs text-gray-400">

CLIENT

</p>

<p class="mb-4">

Client name

</p>


<p class="text-xs text-gray-400">

SERVICES

</p>

<p>

Curatorial Writing<br>
Experience Design<br>
Narrative Strategy

</p>


<button
class="mt-6 w-full bg-terracotta text-white py-3 rounded-full">

INQUIRE PROJECT

</button>

</div>

</div>

</div>

</section>



<!-- NEXT -->

<section class="bg-paper border-t border-sand text-center py-10">

Next Project →

</section>



<!-- FOOTER -->

<footer class="bg-ink text-white py-20 text-center">

<h2 class="text-3xl font-serif">

Let's build a new story.

</h2>

</footer>


</body>
</html>
